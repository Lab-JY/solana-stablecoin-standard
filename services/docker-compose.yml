version: "3.8"

services:
  mint-burn:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: mint-burn
    container_name: sss-mint-burn
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=sqlite:/app/data/sss.db
      - RPC_URL=${RPC_URL:-https://api.devnet.solana.com}
      - KEYPAIR_PATH=/app/keys/id.json
      - PROGRAM_ID=${PROGRAM_ID:-11111111111111111111111111111111}
      - MINT_BURN_PORT=3000
      - RUST_LOG=info
    volumes:
      - sss-data:/app/data
      - ${KEYPAIR_PATH:-./keys}:/app/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  compliance:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: compliance
    container_name: sss-compliance
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=sqlite:/app/data/sss.db
      - RPC_URL=${RPC_URL:-https://api.devnet.solana.com}
      - KEYPAIR_PATH=/app/keys/id.json
      - PROGRAM_ID=${PROGRAM_ID:-11111111111111111111111111111111}
      - COMPLIANCE_PORT=3000
      - RUST_LOG=info
    volumes:
      - sss-data:/app/data
      - ${KEYPAIR_PATH:-./keys}:/app/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  indexer:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: indexer
    container_name: sss-indexer
    environment:
      - DATABASE_URL=sqlite:/app/data/sss.db
      - RPC_URL=${RPC_URL:-https://api.devnet.solana.com}
      - WS_URL=${WS_URL:-wss://api.devnet.solana.com}
      - PROGRAM_ID=${PROGRAM_ID:-11111111111111111111111111111111}
      - WEBHOOK_SERVICE_URL=http://webhook:3000
      - RUST_LOG=info
    volumes:
      - sss-data:/app/data
    depends_on:
      webhook:
        condition: service_healthy
    restart: unless-stopped

  webhook:
    build:
      context: ..
      dockerfile: services/Dockerfile
      args:
        SERVICE: webhook
    container_name: sss-webhook
    ports:
      - "3004:3000"
    environment:
      - DATABASE_URL=sqlite:/app/data/sss.db
      - WEBHOOK_PORT=3000
      - WEBHOOK_POLL_INTERVAL_SECS=5
      - RUST_LOG=info
    volumes:
      - sss-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  sss-data:
    driver: local
